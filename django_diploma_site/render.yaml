services:
  - type: web
    name: diploma-site
    runtime: python
    plan: free
    rootDir: django_diploma_site
    buildCommand: ./build.sh
    startCommand: gunicorn diploma_site.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
